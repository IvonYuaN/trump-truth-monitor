name: Trump Truth Social Daily Report

on:
  schedule:
    # 每天 UTC 02:00 运行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  daily-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run main script
        run: python main.py
        env:
          PYTHONIOENCODING: utf-8
      
      - name: Send email notification
        run: python send_email.py
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
      
      - name: Commit and push archive
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/truth_archive.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update archive: $(date '+%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: truth-social-report
          path: output/*.xlsx
          retention-days: 30
