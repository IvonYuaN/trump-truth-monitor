name: Update Data

on:
  schedule:
    # 帖子数据每3小时（UTC 0,3,6,9,12,15,18,21 = 北京时间 8,11,14,17,20,23,2,5）
    - cron: '0 */3 * * *'
    # 时间线每6小时（UTC 1,7,13,19 = 北京时间 9,15,21,3）
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

jobs:
  update-posts:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Update posts data
        run: |
          mkdir -p output
          python update_data.py

      - name: Commit and push posts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: auto-update posts.json $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-timeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Update war timeline from StardustWhisper
        run: |
          mkdir -p output
          python update_timeline.py

      - name: Commit timeline update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: sync war timeline from StardustWhisper $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
